<svg width="100%" viewBox="0 0 680 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Vivek Kumar animated profile banner">
  <style>
    @keyframes drift {
      0%, 100% { transform: translateY(0); opacity: 0.72; }
      50% { transform: translateY(-8px); opacity: 1; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 0.45; transform: scale(1.04); }
    }

    @keyframes glow {
      0%, 100% { opacity: 0.65; }
      50% { opacity: 1; }
    }

    @keyframes slide {
      0% { transform: translateX(-160px); opacity: 0; }
      20%, 80% { opacity: 0.35; }
      100% { transform: translateX(680px); opacity: 0; }
    }

    @keyframes cursor {
      0%, 45% { opacity: 1; }
      46%, 100% { opacity: 0; }
    }

    .float-a { animation: drift 4s ease-in-out infinite; transform-origin: center; }
    .float-b { animation: drift 5.5s ease-in-out infinite reverse; transform-origin: center; }
    .pulse { animation: pulse 3.2s ease-in-out infinite; transform-origin: 580px -30px; }
    .glow { animation: glow 2.4s ease-in-out infinite; }
    .scan { animation: slide 6s linear infinite; }
    .cursor { animation: cursor 1s steps(1) infinite; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#0d1b3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#e0d7ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <rect width="680" height="220" fill="url(#bg)"/>
  <rect class="glow" x="0" y="0" width="680" height="3" fill="url(#accent)"/>
  <rect class="glow" x="0" y="217" width="680" height="3" fill="url(#accent)" opacity="0.5"/>
  <rect class="scan" x="0" y="0" width="120" height="220" fill="#ffffff" opacity="0.08"/>

  <g class="pulse">
    <circle cx="580" cy="-30" r="130" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.25"/>
    <circle cx="580" cy="-30" r="90" fill="none" stroke="#60a5fa" stroke-width="0.5" opacity="0.2"/>
    <circle cx="580" cy="-30" r="55" fill="#a78bfa" opacity="0.07"/>
  </g>
  <g class="float-b">
    <circle cx="-20" cy="200" r="100" fill="none" stroke="#60a5fa" stroke-width="0.5" opacity="0.15"/>
    <circle cx="-20" cy="200" r="60" fill="#60a5fa" opacity="0.05"/>
  </g>

  <g class="float-a" opacity="0.08">
    <circle cx="420" cy="40" r="1.2" fill="#a78bfa"/>
    <circle cx="450" cy="40" r="1.2" fill="#a78bfa"/>
    <circle cx="480" cy="40" r="1.2" fill="#a78bfa"/>
    <circle cx="510" cy="40" r="1.2" fill="#a78bfa"/>
    <circle cx="540" cy="40" r="1.2" fill="#a78bfa"/>
    <circle cx="570" cy="40" r="1.2" fill="#a78bfa"/>
    <circle cx="600" cy="40" r="1.2" fill="#a78bfa"/>
    <circle cx="420" cy="70" r="1.2" fill="#a78bfa"/>
