<svg width="100%" viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Vivek Kumar professional animated profile banner">
  <style>
    @keyframes shimmer {
      0% { transform: translateX(-360px); opacity: 0; }
      18% { opacity: 0.22; }
      82% { opacity: 0.22; }
      100% { transform: translateX(1220px); opacity: 0; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.35; transform: scale(1); }
      50% { opacity: 0.78; transform: scale(1.045); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes blink {
      0%, 45% { opacity: 1; }
      46%, 100% { opacity: 0; }
    }

    @keyframes dash {
      to { stroke-dashoffset: -180; }
    }

    .shimmer { animation: shimmer 7s ease-in-out infinite; }
    .pulse { animation: pulse 4s ease-in-out infinite; transform-origin: center; }
    .float { animation: float 5.5s ease-in-out infinite; transform-origin: center; }
    .float2 { animation: float 6.8s ease-in-out infinite reverse; transform-origin: center; }
    .cursor { animation: blink 1s steps(1) infinite; }
    .dash { stroke-dasharray: 10 14; animation: dash 9s linear infinite; }
  </style>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050816"/>
      <stop offset="0.42" stop-color="#111827"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>

    <radialGradient id="haloOne" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="haloTwo" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="accent" x1="160" y1="0" x2="1040" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>

    <linearGradient id="title" x1="0" y1="0" x2="520" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#dbeafe"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>

    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0.94"/>
    </linearGradient>

    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#94a3b8" stroke-width="0.45" opacity="0.16"/>
    </pattern>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#grid)"/>
  <rect class="shimmer" x="0" y="0" width="280" height="360" fill="#ffffff" opacity="0.08"/>

  <circle class="pulse" cx="970" cy="58" r="185" fill="url(#haloTwo)"/>
  <circle class="pulse" cx="1025" cy="295" r="150" fill="url(#haloOne)"/>
  <circle class="float2" cx="88" cy="284" r="190" fill="url(#haloOne)" opacity="0.72"/>

  <path class="dash" d="M 738 72 C 850 20, 982 36, 1080 112 S 1188 288, 1080 320" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.28"/>
  <path class="dash" d="M 40 246 C 190 190, 295 238, 394 164 S 566 82, 682 120" fill="none" stroke="url(#accent)" stroke-width="1.2" opacity="0.22"/>

  <rect x="58" y="42" width="1084" height="276" rx="28" fill="#020617" opacity="0.64" stroke="#334155" stroke-width="1"/>
  <rect x="58" y="42" width="1084" height="276" rx="28" fill="none" stroke="url(#accent)" stroke-width="1.4" opacity="0.48"/>

  <g transform="translate(92 78)">
    <circle cx="100" cy="102" r="82" fill="#020617" stroke="url(#accent)" stroke-width="4" filter="url(#glow)"/>
    <circle cx="100" cy="102" r="66" fill="#111827" stroke="#1e293b" stroke-width="1.2"/>
    <text x="100" y="116" text-anchor="middle" fill="url(#title)" font-size="48" font-weight="800" font-family="Inter, Segoe UI, Arial, sans-serif">VK</text>
    <text x="100" y="152" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600" font-family="Inter, Segoe UI, Arial, sans-serif" letter-spacing="1.8">WEBDEV-VIVEK</text>
  </g>

  <g transform="translate(298 82)">
    <rect x="0" y="0" width="104" height="28" rx="14" fill="#172554" stroke="#38bdf8" stroke-width="1" opacity="0.88"/>
    <text x="52" y="19" text-anchor="middle" fill="#bae6fd" font-size="12" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">OPEN TO WORK</text>

    <text x="0" y="82" fill="url(#title)" font-size="56" font-weight="900" font-family="Inter, Segoe UI, Arial, sans-serif">Vivek Kumar</text>
    <rect x="0" y="96" width="414" height="4" rx="2" fill="url(#accent)"/>
    <text x="0" y="137" fill="#cbd5e1" font-size="22" font-weight="650" font-family="Inter, Segoe UI, Arial, sans-serif">B.Tech CSE Student | Full-Stack Developer</text>
    <text x="0" y="169" fill="#94a3b8" font-size="17" font-weight="500" font-family="Inter, Segoe UI, Arial, sans-serif">Java, DSA, React.js, Node.js, MongoDB, Flask, AI Systems</text>
    <rect class="cursor" x="540" y="151" width="3" height="24" rx="1.5" fill="#34d399"/>

    <g transform="translate(0 202)">
      <rect x="0" y="0" width="92" height="30" rx="15" fill="#0f172a" stroke="#22d3ee" stroke-width="1"/>
      <text x="46" y="20" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="700" font-family="JetBrains Mono, Consolas, monospace">React.js</text>
      <rect x="104" y="0" width="92" height="30" rx="15" fill="#0f172a" stroke="#34d399" stroke-width="1"/>
      <text x="150" y="20" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700" font-family="JetBrains Mono, Consolas, monospace">Node.js</text>
      <rect x="208" y="0" width="96" height="30" rx="15" fill="#0f172a" stroke="#a78bfa" stroke-width="1"/>
      <text x="256" y="20" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="700" font-family="JetBrains Mono, Consolas, monospace">MongoDB</text>
      <rect x="316" y="0" width="74" height="30" rx="15" fill="#0f172a" stroke="#fb923c" stroke-width="1"/>
      <text x="353" y="20" text-anchor="middle" fill="#fdba74" font-size="12" font-weight="700" font-family="JetBrains Mono, Consolas, monospace">Java</text>
      <rect x="402" y="0" width="78" height="30" rx="15" fill="#0f172a" stroke="#f472b6" stroke-width="1"/>
      <text x="441" y="20" text-anchor="middle" fill="#f9a8d4" font-size="12" font-weight="700" font-family="JetBrains Mono, Consolas, monospace">Flask</text>
    </g>
  </g>

  <g opacity="0.82">
    <circle class="float" cx="742" cy="78" r="3" fill="#22d3ee"/>
    <circle class="float2" cx="1102" cy="84" r="4" fill="#a78bfa"/>
    <circle class="float" cx="766" cy="296" r="4" fill="#34d399"/>
    <circle class="float2" cx="1136" cy="260" r="3" fill="#60a5fa"/>
    <circle class="float" cx="450" cy="48" r="2.8" fill="#a78bfa"/>
  </g>

  <rect x="58" y="318" width="1084" height="3" rx="1.5" fill="url(#accent)" opacity="0.75"/>
</svg>
