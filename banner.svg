    <circle cx="480" cy="70" r="1.2" fill="#a78bfa"/>
    <circle cx="510" cy="70" r="1.2" fill="#a78bfa"/>
    <circle cx="540" cy="70" r="1.2" fill="#a78bfa"/>
    <circle cx="570" cy="70" r="1.2" fill="#a78bfa"/>
    <circle cx="600" cy="70" r="1.2" fill="#a78bfa"/>
    <circle cx="420" cy="100" r="1.2" fill="#a78bfa"/>
    <circle cx="450" cy="100" r="1.2" fill="#a78bfa"/>
    <circle cx="480" cy="100" r="1.2" fill="#a78bfa"/>
    <circle cx="510" cy="100" r="1.2" fill="#a78bfa"/>
    <circle cx="540" cy="100" r="1.2" fill="#a78bfa"/>
    <circle cx="570" cy="100" r="1.2" fill="#a78bfa"/>
    <circle cx="600" cy="100" r="1.2" fill="#a78bfa"/>
  </g>

  <g class="float-b" opacity="0.06" stroke="#60a5fa" stroke-width="0.8">
    <line x1="400" y1="130" x2="680" y2="130"/>
    <line x1="410" y1="145" x2="680" y2="145"/>
    <line x1="430" y1="160" x2="680" y2="160"/>
    <line x1="440" y1="175" x2="680" y2="175"/>
  </g>

  <circle class="glow" cx="88" cy="108" r="52" fill="#1e1550" stroke="url(#accent)" stroke-width="2"/>
  <circle cx="88" cy="108" r="45" fill="#2a1d6e" opacity="0.7"/>
  <text x="88" y="116" text-anchor="middle" fill="url(#nameGrad)" font-size="26" font-weight="700" font-family="monospace">VK</text>

  <text x="164" y="82" fill="url(#nameGrad)" font-size="36" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Vivek Kumar</text>
  <rect x="164" y="89" width="210" height="2" rx="1" fill="url(#accent)" opacity="0.7"/>
  <rect x="164" y="102" width="194" height="24" rx="12" fill="#a78bfa" opacity="0.15" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="261" y="118" text-anchor="middle" fill="#c4b5fd" font-size="12" font-family="Segoe UI, Arial, sans-serif" font-weight="500">B.Tech CSE  -  SISTec, Bhopal</text>

  <line x1="164" y1="138" x2="390" y2="138" stroke="#a78bfa" stroke-width="0.5" opacity="0.3"/>
  <circle cx="172" cy="154" r="4" fill="#60a5fa" opacity="0.7"/>
  <text x="183" y="158" fill="#94a3b8" font-size="12" font-family="Segoe UI, Arial, sans-serif">Bhopal, Madhya Pradesh, India</text>
  <circle cx="172" cy="174" r="4" fill="#a78bfa" opacity="0.7"/>
  <text x="183" y="178" fill="#94a3b8" font-size="12" font-family="Segoe UI, Arial, sans-serif">Full-Stack Dev  -  Java &amp; DSA  -  AI Systems</text>
  <circle cx="172" cy="194" r="4" fill="#34d399" opacity="0.7"/>
  <text x="183" y="198" fill="#94a3b8" font-size="12" font-family="Segoe UI, Arial, sans-serif">vk9213587@gmail.com</text>
