  <rect x="318" y="206" width="32" height="14" rx="7" fill="#1e1550" stroke="#fb923c" stroke-width="0.8"/>
  <text x="334" y="217" text-anchor="middle" fill="#fdba74" font-size="9" font-family="monospace">Java</text>
